<!-- App root -->
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function useTimer(active) {
  const [sec, setSec] = useState(0);
  useEffect(() => {
    if (!active) return;
    const id = setInterval(() => setSec((s) => s + 1), 1000);
    return () => clearInterval(id);
  }, [active]);
  const format = (s) => `${String(Math.floor(s / 3600)).padStart(2, '0')}:${String(Math.floor((s % 3600) / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
  return [format(sec), setSec];
}

function useBackend() {
  // Probe the FastAPI backend once. Fall back to mock state silently.
  const [hasBackend, setHasBackend] = useState(null);
  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const ctrl = new AbortController();
        const t = setTimeout(() => ctrl.abort(), 1200);
        const r = await fetch('/api/meeting/state', { signal: ctrl.signal });
        clearTimeout(t);
        if (!cancelled) setHasBackend(r.ok);
      } catch {
        if (!cancelled) setHasBackend(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);
  return hasBackend;
}

function getStartState(prev) {
  const mock = window.MM.MOCK_STATE || {};
  return {
    ...mock,
    meeting: null,
    utterances: [],
    topics: [],
    issues: {},
    interventions: [],
    references: [],
    speaker_names: {},
    issue_tokens: {},
    meetings_history: prev?.meetings_history || mock.meetings_history || [],
  };
}

function App() {
  // Route: 'start' | 'live' | 'summary'
  const [route, setRoute] = useState('start');

  const [state, setState] = useState(() => getStartState());
  const [activeTopicId, setActiveTopicId] = useState(1);
  const [sidebarOpen, setSidebarOpen] = useState(() => localStorage.getItem('mm_sidebar') !== 'closed');
  const toggleSidebar = () => setSidebarOpen((o) => { localStorage.setItem('mm_sidebar', o ? 'closed' : 'open'); return !o; });
  const [logsOpen, setLogsOpen] = useState(false);
  const [logs, setLogs] = useState([]);
  const [notesByTopic, setNotesByTopic] = useState({});
  const [isDark, setIsDark] = useState(() => localStorage.getItem('mm_theme') !== 'light');
  const toggleTheme = () => setIsDark((d) => { localStorage.setItem('mm_theme', d ? 'light' : 'dark'); return !d; });
  const [recording, setRecording] = useState(false);
  const [paused, setPaused] = useState(false);
  const [muted, setMuted] = useState(false);
  const [analyzing, setAnalyzing] = useState(false);
  const [connected, setConnected] = useState(true);
  const [calibration, setCalibration] = useState({ state: 'idle', threshold: null });
  const [partialText, setPartialText] = useState('');
  const [partialSpeaker, setPartialSpeaker] = useState('');
  const [level, setLevel] = useState(0);
  const [bookmarks, setBookmarks] = useState([]);
  const [summary, setSummary] = useState(null);
  const [summaryLoading, setSummaryLoading] = useState(false);
  const [timer, setTime] = useTimer(recording && !paused);

  const hasBackend = useBackend();
  const audioRef = useRef(null);
  const wsRef = useRef(null);
  const historyViewRef = useRef(false);
  const liveSnapshotRef = useRef(null);
  const lastTopicCountRef = useRef(0);

  // ── CSS vars mount ───────────────────────────────────
  const css = isDark ? window.MM.applyDarkTheme() : window.MM.applyLightTheme();

  // ── Load real backend state if available ──────────────
  useEffect(() => {
    if (hasBackend !== true) return;
    let cancelled = false;
    async function tick() {
      if (historyViewRef.current) return;
      try {
        const s = await window.MM.api.state();
        if (cancelled) return;
        setState((prev) => ({
          ...prev,
          utterances: s.utterances || [],
          topics: s.topics || prev.topics,
          issues: s.issues || prev.issues,
          interventions: s.interventions || [],
          references: s.references || [],
          issue_tokens: s.issue_tokens || {},
          issue_token_threshold: s.issue_token_threshold || prev.issue_token_threshold || 500,
        }));
        // 새 안건이 추가됐을 때만 자동 전환. 매 폴링마다 강제 전환하면 사용자가 다른 탭으로 이동할 수 없음.
        const topics = s.topics || [];
        const count = topics.length;
        const grew = count > lastTopicCountRef.current;
        lastTopicCountRef.current = count;
        if (grew && count) {
          setActiveTopicId(topics[count - 1].id);
        } else if (count) {
          // 현재 활성 안건이 사라졌으면 마지막 안건으로 폴백
          setActiveTopicId((cur) => (topics.some((t) => t.id === cur) ? cur : topics[count - 1].id));
        }
      } catch (e) { setConnected(false); }
    }
    tick();
    const id = setInterval(tick, 3000);
    (async () => {
      try {
        const res = await window.MM.api.listMeetings();
        if (!cancelled && res.meetings) {
          setState((prev) => ({
            ...prev,
            meetings_history: withLiveMeeting(res.meetings.map(historyItemFromDb), prev.meeting),
          }));
        }
      } catch {}
    })();
    return () => { cancelled = true; clearInterval(id); };
  }, [hasBackend]);

  // ── Server logs stream (/ws/updates) ────────────────
  useEffect(() => {
    if (hasBackend !== true) return;
    const ws = new window.MM.WS('/ws/updates');
    ws.onMessage((m) => {
      if (m.type === 'log') {
        setLogs((prev) => {
          const next = [...prev, { level: m.level, message: m.message }];
          return next.length > 200 ? next.slice(-200) : next;
        });
      }
    });
    ws.connect();
    return () => ws.close();
  }, [hasBackend]);

  // ── Derived ─────────────────────────────────────────
  const activeTopic = state.topics.find((t) => t.id === activeTopicId) || state.topics[0];
  const activeIssue = state.issues[activeTopicId] || state.issues[1];
  const speakerNames = state.speaker_names || {};

  // ── Mic level ticker so meter is alive ───────────────
  useEffect(() => {
    if (!recording || paused || muted) { setLevel(0); return; }
    const id = setInterval(() => {
      // If real audio is plugged in, use its level; else animate
      const v = audioRef.current?.level;
      setLevel(v != null ? v : 0.25 + Math.random() * 0.5);
    }, 120);
    return () => clearInterval(id);
  }, [recording, paused, muted]);

  // ── Actions ─────────────────────────────────────────
  const MOCK_SPEAKER_NAMES = { 'Speaker 1': '김지연', 'Speaker 2': '박민호', 'Speaker 3': '이서준', 'Speaker 4': '최하늘' };

  function historyItemFromDb(m) {
    return {
      id: m.id,
      title: m.title || '(제목 없음)',
      date: m.started_at ? m.started_at.slice(0, 16).replace('T', ' ') : '',
      duration: m.ended_at ? '' : '',
      active: !m.ended_at,
    };
  }

  function historyItemFromMeeting(meeting, patch = {}) {
    return {
      id: meeting?.id,
      title: meeting?.title || '새 회의',
      date: meeting?.created_at || '방금',
      active: !!meeting?.active,
      ...patch,
    };
  }

  function upsertHistoryItem(history, item) {
    if (!item?.id) return history || [];
    const itemId = String(item.id);
    const withoutItem = (history || []).filter((m) => String(m.id) !== itemId);
    return [
      item,
      ...withoutItem.map((m) => (item.active ? { ...m, active: false } : m)),
    ];
  }

  function replaceHistoryId(history, tempId, realId, patch = {}) {
    if (!tempId || !realId) return history || [];
    const seen = new Set();
    return (history || []).reduce((items, m) => {
      const item = String(m.id) === String(tempId)
        ? { ...m, ...patch, id: realId, pending: false }
        : m;
      const itemId = String(item.id);
      if (seen.has(itemId)) return items;
      seen.add(itemId);
      items.push(item);
      return items;
    }, []);
  }

  function withLiveMeeting(history, meeting) {
    if (!meeting?.id || !meeting.active) return history || [];
    return upsertHistoryItem(history || [], historyItemFromMeeting(meeting, { active: true }));
  }

  function captureLiveSnapshot(baseState = state) {
    if (!recording || historyViewRef.current || !baseState.meeting?.id) return;
    liveSnapshotRef.current = {
      state: baseState,
      activeTopicId,
      notesByTopic,
      bookmarks,
      partialText,
      partialSpeaker,
      analyzing,
      calibration,
      summary,
      summaryLoading,
    };
  }

  function updateLiveState(updater) {
    if (historyViewRef.current && liveSnapshotRef.current) {
      liveSnapshotRef.current = {
        ...liveSnapshotRef.current,
        state: updater(liveSnapshotRef.current.state),
      };
      return;
    }
    setState(updater);
  }

  function updateLiveMeta(patch) {
    if (!historyViewRef.current || !liveSnapshotRef.current) return false;
    liveSnapshotRef.current = { ...liveSnapshotRef.current, ...patch };
    return true;
  }

  function restoreLiveSnapshot() {
    const snap = liveSnapshotRef.current;
    historyViewRef.current = false;
    if (!snap) {
      setRoute('live');
      return;
    }
    setState((prev) => ({
      ...snap.state,
      meetings_history: withLiveMeeting(prev.meetings_history || snap.state.meetings_history || [], snap.state.meeting),
    }));
    setActiveTopicId(snap.activeTopicId);
    setNotesByTopic(snap.notesByTopic || {});
    setBookmarks(snap.bookmarks || []);
    setPartialText(snap.partialText || '');
    setPartialSpeaker(snap.partialSpeaker || '');
    setAnalyzing(!!snap.analyzing);
    setCalibration(snap.calibration || { state: 'idle', threshold: null });
    setSummary(snap.summary || null);
    setSummaryLoading(!!snap.summaryLoading);
    setRoute('live');
  }

  function openNewMeeting() {
    if (audioRef.current) audioRef.current.stop();
    if (wsRef.current) wsRef.current.close();
    historyViewRef.current = false;
    liveSnapshotRef.current = null;
    setRecording(false);
    setPaused(false);
    setMuted(false);
    setAnalyzing(false);
    setCalibration({ state: 'idle', threshold: null });
    setPartialText('');
    setPartialSpeaker('');
    setLevel(0);
    setBookmarks([]);
    setSummary(null);
    setSummaryLoading(false);
    setNotesByTopic({});
    setActiveTopicId(1);
    lastTopicCountRef.current = 0;
    setTime(0);
    setState((prev) => getStartState(prev));
    setRoute('start');
  }

  function startMeeting({ title, calibrationThreshold = null } = {}) {
    const tempMeetingId = `live-${Date.now()}`;
    const displayTitle = title || '새 회의';
    const createdAt = new Date().toLocaleString('ko-KR');
    const initialCalibrationThreshold = Number.isFinite(calibrationThreshold) ? calibrationThreshold : null;
    setCalibration(initialCalibrationThreshold != null
      ? { state: hasBackend ? 'pending' : 'done', threshold: initialCalibrationThreshold }
      : { state: 'idle', threshold: null });
    liveSnapshotRef.current = null;
    historyViewRef.current = false;
    setState((s) => ({
      ...s,
      meeting: { id: tempMeetingId, title: displayTitle, created_at: createdAt, active: true },
      meetings_history: upsertHistoryItem(s.meetings_history || [], {
        id: tempMeetingId,
        title: displayTitle,
        date: createdAt,
        active: true,
        pending: true,
      }),
      speaker_names: { ...MOCK_SPEAKER_NAMES },
      utterances: [], topics: [], issues: {}, interventions: [], references: [],
    }));
    lastTopicCountRef.current = 0;
    setRecording(true); setPaused(false);
    setTime(0);
    setRoute('live');
    if (hasBackend) {
      window.MM.api.startMeeting({ title }).then((r) => {
        if (r?.meeting_id) {
          setState((s) => {
            const nextHistory = replaceHistoryId(s.meetings_history || [], tempMeetingId, r.meeting_id, {
              title: displayTitle,
              active: true,
            }).map((m) => (String(m.id) === String(r.meeting_id) ? m : { ...m, active: false }));
            if (historyViewRef.current && liveSnapshotRef.current) {
              liveSnapshotRef.current = {
                ...liveSnapshotRef.current,
                state: {
                  ...liveSnapshotRef.current.state,
                  meeting: { ...(liveSnapshotRef.current.state.meeting || {}), id: r.meeting_id },
                  meetings_history: nextHistory,
                },
              };
              return { ...s, meetings_history: nextHistory };
            }
            return {
              ...s,
              meeting: { ...(s.meeting || {}), id: r.meeting_id },
              meetings_history: nextHistory,
            };
          });
        }
        window.MM.api.updateSpeakerNames(null, MOCK_SPEAKER_NAMES).catch(() => {});
      }).catch(() => {});
      // WS (real audio)
      const ws = new window.MM.WS('/ws/audio');
      let appliedInitialCalibration = false;
      const applyInitialCalibration = () => {
        if (appliedInitialCalibration || initialCalibrationThreshold == null) return;
        appliedInitialCalibration = true;
        const sent = ws.send(`calibrate:${initialCalibrationThreshold.toFixed(6)}`);
        setCalibration(sent
          ? { state: 'done', threshold: initialCalibrationThreshold }
          : { state: 'error', threshold: null });
      };
      wsRef.current = ws;
      ws.onOpen(() => { setConnected(true); });
      ws.onClose(() => setConnected(false));
      ws.onMessage((m) => {
        if (m.type === 'transcript') {
          if (m.utterance) updateLiveState((s) => ({ ...s, utterances: [...(s.utterances || []), m.utterance] }));
          if (!updateLiveMeta({ partialText: '', analyzing: true })) {
            setPartialText('');
            setAnalyzing(true);
          }
        } else if (m.type === 'analysis') {
          updateLiveState((s) => ({
            ...s,
            topics: m.topics || s.topics,
            issues: m.issues || s.issues,
            interventions: m.interventions || s.interventions,
            references: m.references || s.references,
            issue_tokens: m.issue_tokens || s.issue_tokens || {},
            issue_token_threshold: m.issue_token_threshold || s.issue_token_threshold || 500,
          }));
          if (!updateLiveMeta({ analyzing: false })) setAnalyzing(false);
        } else if (m.type === 'status') {
          const isAnalyzing = m.state === 'analyzing';
          if (!updateLiveMeta({ analyzing: isAnalyzing })) setAnalyzing(isAnalyzing);
        } else if (m.type === 'calibrating') {
          const next = { state: 'calibrating', threshold: null };
          if (!updateLiveMeta({ calibration: next })) setCalibration(next);
        } else if (m.type === 'calibrated') {
          const next = { state: 'done', threshold: Number.isFinite(m.threshold) ? m.threshold : null };
          if (!updateLiveMeta({ calibration: next })) setCalibration(next);
        } else if (m.type === 'ready') {
          applyInitialCalibration();
        }
      });
      ws.connect();
      const streamer = new window.MM.AudioStreamer(ws);
      audioRef.current = streamer;
      streamer.start().catch(() => {});
    }
  }

  function endMeeting() {
    if (audioRef.current) audioRef.current.stop();
    if (wsRef.current) wsRef.current.close();
    liveSnapshotRef.current = null;
    historyViewRef.current = false;
    setRecording(false); setPaused(false);
    setSummary(null);
    setRoute('summary');
    if (hasBackend) {
      setSummaryLoading(true);
      window.MM.api.endMeeting().then((r) => {
        setSummary(r.summary || null);
        setSummaryLoading(false);
        window.MM.api.listMeetings().then((res) => {
          if (res.meetings) setState((prev) => ({ ...prev, meetings_history: res.meetings.map(historyItemFromDb) }));
        }).catch(() => {});
      }).catch(() => { setSummaryLoading(false); });
    } else {
      setSummary({
        one_line: '결제 지연 대응을 위해 PG사 교체를 우선 진행하고, 내부 모듈 개발은 Q3 OKR로 검토하기로 결정.',
        decisions: ['PG사 교체 우선 진행 (5월 1주차 시작)', '내부 모듈 개발은 Q3 OKR로 검토', '박민호 리드, 이서준·최하늘 서포트'],
        action_items: [
          { speaker: 'Speaker 2', who: '박민호', task: 'PG사 3곳 비교 제안서 작성', due: '이번 주 금요일' },
          { speaker: 'Speaker 3', who: '이서준', task: '내부 모듈 공수 추정', due: '다음 주 월요일' },
          { speaker: 'Speaker 4', who: '최하늘', task: '수수료 재협상 준비', due: '4월 28일' },
        ],
      });
    }
  }

  function resetAll() {
    if (audioRef.current) audioRef.current.stop();
    if (wsRef.current) wsRef.current.close();
    liveSnapshotRef.current = null;
    historyViewRef.current = false;
    setRecording(false); setPaused(false); setMuted(false);
    setCalibration({ state: 'idle', threshold: null });
    if (hasBackend) window.MM.api.reset().catch(() => {});
    setState((prev) => getStartState(prev));
    setNotesByTopic({});
    setRoute('start');
  }

  async function loadNotes(topicId) {
    if (!hasBackend || topicId == null) return;
    try {
      const r = historyViewRef.current && state.meeting?.id && state.meeting.id !== 'demo'
        ? await window.MM.api.listMeetingNotes(state.meeting.id, topicId)
        : await window.MM.api.listNotes(topicId);
      setNotesByTopic((prev) => ({ ...prev, [topicId]: r.notes || [] }));
    } catch {}
  }

  async function saveNote(topicId, text) {
    if (!hasBackend) {
      const local = { id: Date.now(), topic_id: topicId, text, created_at: new Date().toISOString() };
      setNotesByTopic((prev) => ({ ...prev, [topicId]: [...(prev[topicId] || []), local] }));
      return;
    }
    const r = await window.MM.api.saveNote(topicId, text);
    if (r.note) {
      setNotesByTopic((prev) => ({ ...prev, [topicId]: [...(prev[topicId] || []), r.note] }));
    }
  }

  useEffect(() => {
    if (activeTopicId != null && !(activeTopicId in notesByTopic)) loadNotes(activeTopicId);
  }, [activeTopicId, hasBackend]);

  function renameSpeaker(speaker, name) {
    setState((s) => {
      const updated = { ...(s.speaker_names || {}), [speaker]: name };
      if (hasBackend) {
        const meetingId = s.meeting?.id && s.meeting.id !== 'demo' ? s.meeting.id : null;
        window.MM.api.updateSpeakerNames(meetingId, updated).catch(() => {});
      }
      return { ...s, speaker_names: updated };
    });
  }

  function renameTopic(id, title) {
    const trimmed = (title || '').trim() || '안건';
    setState((s) => ({ ...s, topics: s.topics.map((t) => (t.id === id ? { ...t, title: trimmed } : t)) }));
    if (hasBackend) window.MM.api.renameTopic(id, trimmed).catch(() => {});
  }

  function renameMeetingTitle(title) {
    const trimmed = (title || '').trim() || '새 회의';
    const meetingId = historyViewRef.current && state.meeting?.id && state.meeting.id !== 'demo'
      ? state.meeting.id
      : null;
    setState((s) => ({
      ...s,
      meeting: { ...(s.meeting || {}), title: trimmed },
      meetings_history: (s.meetings_history || []).map((m) => (
        m.id === (meetingId || s.meeting?.id) ? { ...m, title: trimmed } : m
      )),
    }));
    if (hasBackend) {
      window.MM.api.renameMeeting(meetingId, trimmed).then((r) => {
        if (r?.meeting_id) {
          setState((s) => ({
            ...s,
            meeting: { ...(s.meeting || {}), id: s.meeting?.id || r.meeting_id, title: r.title || trimmed },
            meetings_history: (s.meetings_history || []).map((m) => (
              m.id === r.meeting_id ? { ...m, title: r.title || trimmed } : m
            )),
          }));
        }
      }).catch(() => {});
    }
  }

  async function addTopic() {
    const fallbackId = Math.max(0, ...state.topics.map((t) => t.id)) + 1;
    if (hasBackend) {
      try {
        const r = await window.MM.api.addTopic(`안건 ${fallbackId}`);
        if (r?.topic) {
          setState((s) => ({ ...s, topics: [...s.topics, r.topic] }));
          setActiveTopicId(r.topic.id);
          return;
        }
      } catch {}
    }
    setState((s) => ({ ...s, topics: [...s.topics, { id: fallbackId, title: `안건 ${fallbackId}`, start_time: null, end_time: null, utterances: [] }] }));
    setActiveTopicId(fallbackId);
  }

  function updateIssue(topicId, patch) {
    setState((s) => {
      const cur = s.issues[topicId] || { topic: '', positions: [], open_questions: [] };
      const next = typeof patch === 'object' && ('positions' in patch || 'consensus' in patch || 'decision' in patch || 'open_questions' in patch || 'topic' in patch)
        ? { ...cur, ...patch } : { ...cur, topic: patch.title || cur.topic };
      return { ...s, issues: { ...s.issues, [topicId]: next } };
    });
    if (hasBackend) window.MM.api.updateIssue(topicId, patch).catch(() => {});
  }

  function commitConsensus(topicId, text) { updateIssue(topicId, { consensus: text }); }

  function dismissIntervention(idx) {
    setState((s) => ({ ...s, interventions: s.interventions.filter((_, i) => i !== idx) }));
  }

  async function askAi(question) {
    if (hasBackend) {
      const r = await window.MM.api.ask(question);
      if (r.error) throw new Error(r.error);
      return r.answer || '답변을 찾지 못했어요.';
    }
    if (window.claude?.complete) {
      const ctx = state.utterances.slice(-20).map((u) => `[${u.time}] ${speakerNames[u.speaker] || u.speaker}: ${u.text}`).join('\n');
      return await window.claude.complete(`다음은 진행 중인 회의의 최근 발화입니다.\n\n${ctx}\n\n질문: ${question}\n\n한국어로 간결히 답하세요.`);
    }
    return '백엔드 연결 시 AI가 회의 컨텍스트로 답변해요.';
  }

  function toggleBookmark(i) {
    setBookmarks((b) => (b.includes(i) ? b.filter((x) => x !== i) : [...b, i]));
  }

  function calibrateLiveMic() {
    const sent = audioRef.current?.calibrate?.() || wsRef.current?.send?.('calibrate');
    setCalibration(sent ? { state: 'calibrating', threshold: null } : { state: 'error', threshold: null });
  }

  async function loadMeeting(id) {
    const visibleLiveId = recording && !historyViewRef.current ? state.meeting?.id : null;
    const snapLiveId = liveSnapshotRef.current?.state?.meeting?.id;
    if (recording && (String(id) === String(visibleLiveId) || String(id) === String(snapLiveId))) {
      restoreLiveSnapshot();
      return;
    }
    if (!hasBackend || !id) return;
    try {
      if (recording && !historyViewRef.current) captureLiveSnapshot();
      const data = await window.MM.api.getMeeting(id);
      if (data.error) return;
      if (!recording) {
        if (audioRef.current) audioRef.current.stop();
        if (wsRef.current) wsRef.current.close();
      }
      historyViewRef.current = true;
      if (!recording) {
        setRecording(false);
        setPaused(false);
      }
      setCalibration({ state: 'idle', threshold: null });
      const m = data.meeting || {};
      setState((prev) => ({
        ...prev,
        meeting: { id: m.id, title: m.title || '(제목 없음)', active: false },
        utterances: data.utterances || [],
        topics: data.topics || [],
        issues: data.issues || {},
        interventions: data.interventions || [],
        references: data.references || [],
        speaker_names: m.speaker_names || {},
      }));
      const grouped = {};
      for (const n of (data.notes || [])) {
        (grouped[n.topic_id] = grouped[n.topic_id] || []).push(n);
      }
      setNotesByTopic(grouped);
      if ((data.topics || []).length) setActiveTopicId(data.topics[data.topics.length - 1].id);
      lastTopicCountRef.current = (data.topics || []).length;
      setRoute('live');
    } catch {}
  }

  const { TopBar, Sidebar, AgendaTabs, RecordBar, StartScreen, LogsModal, SummaryScreen,
          TranscriptPanel, IssueCard, RightRail } = window.MM;
  const logsProps = { open: logsOpen, onClose: () => setLogsOpen(false), logs, onClear: () => setLogs([]) };
  const viewingHistory = historyViewRef.current;
  const sidebarProps = { meetings: state.meetings_history || [], activeId: state.meeting?.id, open: sidebarOpen, onToggleOpen: toggleSidebar };

  // ── START SCREEN ─────────────────────────────────
  if (route === 'start') {
    return (
      <div style={{ ...css, display: 'flex', height: '100vh', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font)' }}>
        <Sidebar {...sidebarProps} onNew={openNewMeeting} onSelect={loadMeeting}/>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <TopBar title="새 회의" recording={false} connected={connected}
            onOpenLogs={() => setLogsOpen(true)} isDark={isDark} onToggleTheme={toggleTheme}/>
          <StartScreen onStart={startMeeting} onUpload={() => document.getElementById('mm-upload')?.click()}/>
          <input id="mm-upload" type="file" accept="audio/*,video/*" style={{ display: 'none' }}
            onChange={async (e) => {
              const f = e.target.files?.[0]; if (!f) return;
              if (hasBackend) { try { await window.MM.api.upload(f); setRoute('live'); } catch {} }
              else { startMeeting({ title: f.name }); }
            }}/>
        </div>
        <LogsModal {...logsProps}/>
      </div>
    );
  }

  // ── SUMMARY SCREEN ───────────────────────────────
  if (route === 'summary') {
    return (
      <div style={{ ...css, display: 'flex', height: '100vh', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font)' }}>
        <Sidebar {...sidebarProps} onNew={openNewMeeting} onSelect={loadMeeting}/>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <TopBar title={state.meeting?.title || '완료된 회의'} recording={false} connected={connected}
            onOpenLogs={() => setLogsOpen(true)} isDark={isDark} onToggleTheme={toggleTheme}/>
          <SummaryScreen meeting={state.meeting} summary={summary} loading={summaryLoading}
            issues={state.issues} topics={state.topics} notesByTopic={notesByTopic}
            onBack={() => setRoute('live')} onNew={openNewMeeting}/>
        </div>
        <LogsModal {...logsProps}/>
      </div>
    );
  }

  // ── LIVE SCREEN ──────────────────────────────────
  return (
    <div style={{ ...css, display: 'flex', height: '100vh', background: 'var(--bg)', color: 'var(--text)', fontFamily: 'var(--font)' }}>
      <Sidebar {...sidebarProps} onNew={openNewMeeting} onSelect={loadMeeting}/>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <TopBar title={state.meeting?.title} onTitleChange={renameMeetingTitle}
          recording={recording && !viewingHistory} analyzing={!viewingHistory && analyzing} connected={connected}
          onOpenLogs={() => setLogsOpen(true)} isDark={isDark} onToggleTheme={toggleTheme}/>
        <div style={{ flex: 1, display: 'flex', minHeight: 0, position: 'relative' }}>
          <TranscriptPanel utterances={state.utterances} live={recording && !paused && !viewingHistory}
            speakerNames={speakerNames} onRenameSpeaker={renameSpeaker}
            analyzing={analyzing} partialText={partialText} partialSpeaker={partialSpeaker}
            bookmarks={bookmarks} onBookmark={toggleBookmark}/>

          <div style={{ flex: 1, overflowY: 'auto', padding: '24px 28px 100px', background: 'var(--bg)', minWidth: 0 }}>
            <div style={{ maxWidth: 780, margin: '0 auto', display: 'grid', gap: 20 }}>
              <AgendaTabs topics={state.topics} activeId={activeTopicId} onSelect={setActiveTopicId}
                onAdd={addTopic} onRename={renameTopic}/>

              {activeIssue && (
                <IssueCard issue={activeIssue} topicId={activeTopicId} topic={activeTopic} active={true}
                  pendingTokens={state.issue_tokens?.[activeTopicId] || 0}
                  tokenThreshold={state.issue_token_threshold || 500}
                  notes={notesByTopic[activeTopicId] || []}
                  onSaveNote={(text) => saveNote(activeTopicId, text)}
                  onCommitConsensus={(text) => commitConsensus(activeTopicId, text)}
                  onUpdate={(patch) => updateIssue(activeTopicId, patch)}/>
              )}

              {/* Previous topic summaries */}
              {state.topics.filter((t) => t.id !== activeTopicId).map((t) => {
                const iss = state.issues[t.id];
                if (!iss) return null;
                return (
                  <div key={t.id} onClick={() => setActiveTopicId(t.id)} style={{ background: 'var(--surface-muted)', border: '1px solid var(--border)', borderRadius: 16, padding: 20, cursor: 'pointer' }}>
                    <div style={{ fontSize: 'var(--fs-xs)', fontWeight: 700, color: 'var(--text-3)', letterSpacing: '0.04em', marginBottom: 6 }}>이전 안건</div>
                    <div style={{ fontSize: 'var(--fs-md)', fontWeight: 700, color: 'var(--text)', marginBottom: 6 }}>{t.title}</div>
                    {iss.consensus && <div style={{ fontSize: 'var(--fs-sm)', color: 'var(--text-2)' }}>합의: {iss.consensus}</div>}
                  </div>
                );
              })}
            </div>
          </div>

          <RightRail interventions={state.interventions || []} references={state.references || []}
            onDismissIntervention={dismissIntervention} onAskAi={askAi}/>

          {/* Floating record bar */}
          {recording && !viewingHistory && (
            <div style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', zIndex: 20 }}>
              <RecordBar recording={recording} paused={paused} onPause={() => setPaused((p) => !p)}
                timer={timer} level={level} muted={muted} onToggleMute={() => setMuted((m) => !m)}
                onCalibrate={hasBackend ? calibrateLiveMic : null}
                calibrationState={calibration.state} calibrationThreshold={calibration.threshold}
                onEnd={endMeeting}/>
            </div>
          )}
        </div>
      </div>
      <LogsModal {...logsProps}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
